# ═══════════════════════════════════════════════════════════════════════════════
# 主仓库 Subtree Pull 工作流
# ═══════════════════════════════════════════════════════════════════════════════
#
# 此工作流用于从子仓库拉取更新到主仓库。与 scripts/push.yml（子仓库使用）配合。
#
# 【配合关系】
# ─────────────────────────────────────────────────────────────────────────────
# scripts/push.yml (子仓库)          .github/workflows/pull.yml (主仓库)
#        │                                    │
#   子仓库 push ──────────────────> repository_dispatch
#        │                                    │
#   发送通知 (curl API) ────────>   触发此工作流
#                                             │
#                                    subtree pull 同步
#
# 【触发方式】
# ─────────────────────────────────────────────────────────────────────────────
# - 自动触发：子仓库通过 repository_dispatch 发送 subtree-update 事件
# - 手动触发：Actions → Subtree Pull → Run workflow（指定组件名）
#
# 【前置条件】
# ─────────────────────────────────────────────────────────────────────────────
# 1. 子仓库需配置 scripts/push.yml 和 PARENT_REPO_TOKEN
# 2. scripts/repos.list 中需包含组件的仓库 URL 映射
#
# 【注意事项】
# ─────────────────────────────────────────────────────────────────────────────
# - 默认拉取到 next 分支，可根据需要修改 ref 参数
# - 如果有冲突，subtree pull 会失败，需手动解决
#
# ═══════════════════════════════════════════════════════════════════════════════

name: Subtree Pull

# 当收到组件仓库的更新通知时触发
on:
  repository_dispatch:
    types: [subtree-update]
  workflow_dispatch:
    inputs:
      component:
        description: '组件目录名'
        required: true
        type: string
      branch:
        description: '组件分支'
        required: false
        type: string
        default: 'main'

permissions:
  contents: write

jobs:
  subtree-pull:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: next
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Get component info
        id: component
        run: |
          # 从 workflow_dispatch 或 repository_dispatch 获取组件信息
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COMPONENT="${{ inputs.component }}"
            BRANCH="${{ inputs.branch }}"
          else
            COMPONENT="${{ github.event.client_payload.component }}"
            BRANCH="${{ github.event.client_payload.branch || 'main' }}"
          fi
          
          echo "component=${COMPONENT}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          
          # 从 repos.list 中查找组件的仓库 URL
          if [ -f "scripts/repos.list" ]; then
            # 读取 repos.list，查找包含组件目录的行
            while IFS='|' read -r url branch dir; do
              # 跳过注释和空行
              [[ "$url" =~ ^[[:space:]]*# ]] && continue
              [[ -z "${url// }" ]] && continue
              
              # 处理两字段格式 (url|dir)
              if [[ -z "$dir" ]]; then
                dir="$branch"
                branch=""
              fi
              
              # 去除空格
              url=$(echo "$url" | xargs)
              dir=$(echo "$dir" | xargs)
              
              # 检查目录名是否匹配（支持完整路径或最后一段）
              dir_name=$(basename "$dir")
              if [[ "$dir" == "${COMPONENT}" || "$dir_name" == "${COMPONENT}" ]]; then
                REPO_URL="$url"
                FULL_DIR="$dir"
                echo "Found component: ${COMPONENT} -> ${REPO_URL} (dir: ${FULL_DIR})"
                break
              fi
            done < "scripts/repos.list"
            
            if [ -n "$REPO_URL" ]; then
              echo "repo_url=${REPO_URL}" >> $GITHUB_OUTPUT
              echo "full_dir=${FULL_DIR}" >> $GITHUB_OUTPUT
            else
              echo "Error: Component ${COMPONENT} not found in repos.list"
              exit 1
            fi
          else
            echo "Error: scripts/repos.list not found"
            exit 1
          fi

      - name: Pull subtree updates
        run: |
          COMPONENT="${{ steps.component.outputs.component }}"
          FULL_DIR="${{ steps.component.outputs.full_dir }}"
          BRANCH="${{ steps.component.outputs.branch }}"
          REPO_URL="${{ steps.component.outputs.repo_url }}"
          
          echo "Pulling updates for ${COMPONENT} from ${REPO_URL}:${BRANCH}"
          echo "Target directory: ${FULL_DIR}"
          
          # 检查组件目录是否存在
          if [ ! -d "${FULL_DIR}" ]; then
            echo "Error: Component directory ${FULL_DIR} does not exist"
            exit 1
          fi
          
          # 使用简化的 remote 名称（替换 / 为 _）
          REMOTE_NAME=$(echo "${FULL_DIR}" | tr '/' '_')
          
          # 添加或更新 remote
          if git remote | grep -q "^${REMOTE_NAME}$"; then
            git remote set-url "${REMOTE_NAME}" "${REPO_URL}"
          else
            git remote add "${REMOTE_NAME}" "${REPO_URL}"
          fi
          
          # 获取远程更新
          git fetch "${REMOTE_NAME}" --no-tags
          
          # 执行 subtree pull
          git subtree pull --prefix="${FULL_DIR}" "${REMOTE_NAME}" "${BRANCH}" -m "Merge subtree ${FULL_DIR}/${BRANCH}"

      - name: Push changes
        run: |
          # 检查是否有新提交需要推送
          git fetch origin next --quiet
          AHEAD=$(git rev-list --count origin/next..HEAD 2>/dev/null || echo "0")
          
          if [ "$AHEAD" -eq 0 ]; then
            echo "No new commits to push"
          else
            echo "Pushing ${AHEAD} commit(s) to next branch..."
            git push origin HEAD:next
            echo "Changes pushed to next branch successfully"
          fi

      - name: Create summary
        run: |
          COMPONENT="${{ steps.component.outputs.component }}"
          FULL_DIR="${{ steps.component.outputs.full_dir }}"
          BRANCH="${{ steps.component.outputs.branch }}"
          REPO_URL="${{ steps.component.outputs.repo_url }}"
          
          echo "## Subtree Pull Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Component**: ${COMPONENT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Directory**: ${FULL_DIR}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${BRANCH}" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: ${REPO_URL}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
