# ═══════════════════════════════════════════════════════════════════════════════
# 组件仓库 GitHub Actions 配置模板
# ═══════════════════════════════════════════════════════════════════════════════
#
# 此文件用于子仓库，当子仓库有更新时通知主仓库进行 subtree pull 同步。
#
# 【使用步骤】
# ─────────────────────────────────────────────────────────────────────────────
# 1. 将此文件复制到子仓库的 .github/workflows/ 目录：
#    cp scripts/push.yml <子仓库>/.github/workflows/push.yml
#
# 2. 在子仓库中配置 Secret：
#    GitHub 仓库 → Settings → Secrets → Actions → New repository secret
#    名称: PARENT_REPO_TOKEN
#    值: 具有 rcore-os/tgoskits 主仓库 repo 权限的 Personal Access Token
#
# 3. 修改 PARENT_REPO 变量：
#    将下方 jobs.notify.steps[1].env 中的 PARENT_REPO 改为实际的主仓库路径
#
# 【Token 权限要求】
# ─────────────────────────────────────────────────────────────────────────────
# PARENT_REPO_TOKEN 需要 Classic Personal Access Token，权限包括：
#   - repo (Full control of private repositories)
#   或
#   - Fine-grained token: Contents (Read and Write)
#
# 【触发条件】
# ─────────────────────────────────────────────────────────────────────────────
# - 自动触发：推送到 dev 或 main 分支时
# - 手动触发：Actions → Notify Parent Repository → Run workflow
#
# 【工作流程】
# ─────────────────────────────────────────────────────────────────────────────
# 子仓库 push → 触发此工作流 → 调用主仓库 API → 主仓库 subtree pull
#
# 【注意事项】
# ─────────────────────────────────────────────────────────────────────────────
# - 主仓库需要配置接收 repository_dispatch 事件的同步工作流
# - 如果不需要子仓库到主仓库的同步，可以不使用此文件
#
# ═══════════════════════════════════════════════════════════════════════════════

name: Notify Parent Repository

# 当有新的推送时触发
on:
  push:
    branches:
      - dev    # 主仓库推送的目标分支
      - main   # 兼容直接在子仓库开发的情况
      - test
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Get repository info
        id: repo
        run: |
          # 从仓库 URL 中提取组件名称
          # 例如: https://github.com/arceos-hypervisor/arm_vcpu -> arm_vcpu
          REPO_URL="${{ github.repositoryUrl }}"
          COMPONENT=$(echo "${REPO_URL}" | sed 's|.*/||' | sed 's|\.git$||')
          BRANCH="${{ github.ref_name }}"
          
          echo "component=${COMPONENT}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          
          echo "Component: ${COMPONENT}"
          echo "Branch: ${BRANCH}"

      - name: Notify parent repository
        env:
          # 需要在组件仓库的 Secrets 中配置 PARENT_REPO_TOKEN
          # 这个 token 需要有主仓库的 repo 权限
          GITHUB_TOKEN: ${{ secrets.PARENT_REPO_TOKEN }}
        run: |
          COMPONENT="${{ steps.repo.outputs.component }}"
          BRANCH="${{ steps.repo.outputs.branch }}"
          PARENT_REPO="arceos-hypervisor/tgoskits"  # 主仓库的路径
          
          echo "Notifying parent repository about update in ${COMPONENT}:${BRANCH}"
          
          # 使用 GitHub API 触发主仓库的 repository_dispatch 事件
          # 注意：commit message 可能包含特殊字符，使用 jq 或 base64 编码避免 JSON 注入
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          # 将换行符替换为空格，并截取前100个字符
          COMMIT_MSG_SAFE=$(echo "$COMMIT_MSG" | tr '\n' ' ' | cut -c1-100 | sed 's/"/\\"/g')
          
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            https://api.github.com/repos/${PARENT_REPO}/dispatches \
            -d "{
              \"event_type\": \"subtree-update\",
              \"client_payload\": {
                \"component\": \"${COMPONENT}\",
                \"branch\": \"${BRANCH}\",
                \"commit\": \"${{ github.sha }}\",
                \"message\": \"${COMMIT_MSG_SAFE}\",
                \"author\": \"${{ github.actor }}\"
              }
            }"
          
          echo "Notification sent successfully"

      - name: Create summary
        run: |
          COMPONENT="${{ steps.repo.outputs.component }}"
          BRANCH="${{ steps.repo.outputs.branch }}"
          
          echo "## Notification Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Component**: ${COMPONENT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${BRANCH}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Author**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Notification sent" >> $GITHUB_STEP_SUMMARY
