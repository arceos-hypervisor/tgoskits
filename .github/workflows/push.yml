name: Push to Subrepos

# 当推送到主分支时触发
on:
  push:
    branches:
      - main
      - master
      - dev
      - next
  workflow_dispatch:
    inputs:
      components:
        description: '指定要推送的组件（逗号分隔，留空表示自动检测）'
        required: false
        type: string
        default: ''
      branch:
        description: '推送到子仓库的目标分支'
        required: false
        type: string
        default: 'dev'
      force:
        description: '强制推送（覆盖远程更新）'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      components: ${{ steps.detect.outputs.components }}
      has-changes: ${{ steps.detect.outputs.has-changes }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 需要获取上一个 commit 来比较变更

      - name: Detect changed components
        id: detect
        run: |
          # 如果手动指定了组件，直接使用
          if [ -n "${{ inputs.components }}" ]; then
            echo "components=${{ inputs.components }}" >> $GITHUB_OUTPUT
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "Using manually specified components: ${{ inputs.components }}"
            exit 0
          fi
          
          # 自动检测修改的组件
          echo "Detecting changed components..."
          
          # 获取修改的文件列表
          if [ "${{ github.event_name }}" = "push" ]; then
            # 对于 push 事件，比较上一个 commit
            CHANGED_FILES=$(git diff --name-only HEAD^ HEAD)
          else
            # 对于其他事件，使用最近的一个 commit
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          fi
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No changes detected"
            echo "components=" >> $GITHUB_OUTPUT
            echo "has-changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # 分析修改的文件，找出涉及的组件
          declare -A COMPONENTS_MAP
          
          # 读取 repos.list 获取组件列表
          while IFS= read -r line || [[ -n "$line" ]]; do
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "${line// }" ]] && continue
            
            local url branch dir
            IFS='|' read -r url branch dir <<< "$line"
            
            if [[ -z "$dir" ]]; then
              dir="$branch"
              branch=""
            fi
            
            dir=$(echo "$dir" | xargs)
            
            if [[ -n "$dir" ]]; then
              COMPONENTS_MAP["$dir"]=1
            fi
          done < "scripts/repos.list"
          
          # 检查每个修改的文件属于哪个组件
          declare -A CHANGED_COMPONENTS
          
          while IFS= read -r file; do
            # 获取文件的第一级或第二级目录
            local top_dir
            top_dir=$(echo "$file" | cut -d'/' -f1-2)
            
            # 检查是否是已配置的组件目录
            for component in "${!COMPONENTS_MAP[@]}"; do
              if [[ "$file" == "$component"* ]]; then
                CHANGED_COMPONENTS["$component"]=1
                echo "  Found change in component: $component (file: $file)"
                break
              fi
            done
          done <<< "$CHANGED_FILES"
          
          # 生成组件列表（逗号分隔）
          if [ ${#CHANGED_COMPONENTS[@]} -eq 0 ]; then
            echo "No component changes detected"
            echo "components=" >> $GITHUB_OUTPUT
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            COMPONENTS_LIST=$(IFS=','; echo "${!CHANGED_COMPONENTS[*]}")
            echo "components=${COMPONENTS_LIST}" >> $GITHUB_OUTPUT
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "Detected changed components: ${COMPONENTS_LIST}"
          fi

  push-to-subrepos:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: ${{ needs.detect-changes.outputs.has-changes == 'true' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}
        if: ${{ secrets.SSH_KEY != '' }}

      - name: Configure Git
        run: |
          git config --global user.name "$(git log -n 1 --pretty=format:%an)"
          git config --global user.email "$(git log -n 1 --pretty=format:%ae)"

      - name: Get push parameters
        id: params
        run: |
          COMPONENTS="${{ needs.detect-changes.outputs.components }}"
          TARGET_BRANCH="${{ inputs.branch || 'dev' }}"
          FORCE_PUSH="${{ inputs.force || 'false' }}"
          
          echo "components=${COMPONENTS}" >> $GITHUB_OUTPUT
          echo "target_branch=${TARGET_BRANCH}" >> $GITHUB_OUTPUT
          echo "force_push=${FORCE_PUSH}" >> $GITHUB_OUTPUT
          
          echo "Components to push: ${COMPONENTS}"
          echo "Target branch: ${TARGET_BRANCH}"
          echo "Force push: ${FORCE_PUSH}"

      - name: Read repos.list
        id: repos
        run: |
          # 解析 repos.list 并创建组件到仓库 URL 的映射
          declare -A REPO_URLS
          
          while IFS= read -r line || [[ -n "$line" ]]; do
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            [[ -z "${line// }" ]] && continue
            
            local url branch dir
            IFS='|' read -r url branch dir <<< "$line"
            
            if [[ -z "$dir" ]]; then
              dir="$branch"
              branch=""
            fi
            
            url=$(echo "$url" | xargs)
            dir=$(echo "$dir" | xargs)
            
            if [[ -n "$url" && -n "$dir" ]]; then
              # 将信息保存到文件（GitHub Actions 不支持复杂变量）
              echo "${dir}|${url}|${branch:-main}" >> /tmp/repo_mappings.txt
            fi
          done < "scripts/repos.list"
          
          echo "Parsed $(wc -l < /tmp/repo_mappings.txt) repository mappings"

      - name: Push changes to subrepos
        run: |
          COMPONENTS="${{ steps.params.outputs.components }}"
          TARGET_BRANCH="${{ steps.params.outputs.target_branch }}"
          FORCE_PUSH="${{ steps.params.outputs.force_push }}"
          
          # 将逗号分隔的组件列表转换为数组
          IFS=',' read -ra COMP_ARRAY <<< "$COMPONENTS"
          
          FORCE_FLAG=""
          if [ "$FORCE_PUSH" = "true" ]; then
            FORCE_FLAG="--force"
            echo "Warning: Force push enabled. This may overwrite remote changes."
          fi
          
          SUCCESS_COUNT=0
          FAIL_COUNT=0
          
          for component in "${COMP_ARRAY[@]}"; do
            component=$(echo "$component" | xargs)  # 去除空格
            
            echo "=========================================="
            echo "Processing component: ${component}"
            echo "=========================================="
            
            # 从映射文件中查找仓库 URL
            REPO_INFO=$(grep "^${component}|" /tmp/repo_mappings.txt | head -1)
            
            if [ -z "$REPO_INFO" ]; then
              echo "Error: No repository URL found for component ${component}"
              ((FAIL_COUNT++))
              continue
            fi
            
            REPO_URL=$(echo "$REPO_INFO" | cut -d'|' -f2)
            DEFAULT_BRANCH=$(echo "$REPO_INFO" | cut -d'|' -f3)
            
            echo "Repository URL: ${REPO_URL}"
            echo "Default branch: ${DEFAULT_BRANCH}"
            echo "Target branch: ${TARGET_BRANCH}"
            
            # 检查组件目录是否存在
            if [ ! -d "${component}" ]; then
              echo "Error: Component directory ${component} does not exist"
              ((FAIL_COUNT++))
              continue
            fi
            
            # 添加或更新 remote
            REMOTE_NAME=$(echo "${component}" | tr '/' '_')
            
            if git remote | grep -q "^${REMOTE_NAME}$"; then
              echo "Updating remote URL for ${REMOTE_NAME}"
              git remote set-url "${REMOTE_NAME}" "${REPO_URL}"
            else
              echo "Adding remote: ${REMOTE_NAME} -> ${REPO_URL}"
              git remote add "${REMOTE_NAME}" "${REPO_URL}"
            fi
            
            # 获取远程分支信息
            echo "Fetching remote branches..."
            git fetch "${REMOTE_NAME}" --no-tags 2>/dev/null || true
            
            # 检查目标分支是否存在
            if git ls-remote --heads "${REPO_URL}" "${TARGET_BRANCH}" | grep -q "${TARGET_BRANCH}"; then
              echo "Target branch ${TARGET_BRANCH} exists on remote"
            else
              echo "Warning: Target branch ${TARGET_BRANCH} does not exist on remote"
              echo "Will try to push to ${DEFAULT_BRANCH} instead"
              TARGET_BRANCH="${DEFAULT_BRANCH}"
            fi
            
            # 使用 git subtree push
            echo "Pushing ${component} to ${REPO_URL}:${TARGET_BRANCH}..."
            
            PUSH_CMD="git subtree push ${FORCE_FLAG} --prefix=\"${component}\" \"${REMOTE_NAME}\" \"${TARGET_BRANCH}\""
            
            if eval "$PUSH_CMD"; then
              echo "✅ Successfully pushed ${component}"
              ((SUCCESS_COUNT++))
            else
              echo "❌ Failed to push ${component}"
              ((FAIL_COUNT++))
              
              # 如果失败且未启用强制推送，给出建议
              if [ "$FORCE_PUSH" != "true" ]; then
                echo ""
                echo "Push failed. This might be due to:"
                echo "  1. Remote branch has new commits (non-fast-forward)"
                echo "  2. There are conflicts between local and remote changes"
                echo ""
                echo "Solutions:"
                echo "  - Pull remote changes first and resolve conflicts"
                echo "  - Use force push if you're sure (set force=true)"
                echo "  - Check the component directory structure"
              fi
            fi
            
            echo ""
          done
          
          echo "=========================================="
          echo "Push Summary"
          echo "=========================================="
          echo "✅ Success: ${SUCCESS_COUNT}"
          echo "❌ Failed: ${FAIL_COUNT}"
          echo "=========================================="
          
          # 保存结果
          echo "success_count=${SUCCESS_COUNT}" >> $GITHUB_OUTPUT
          echo "fail_count=${FAIL_COUNT}" >> $GITHUB_OUTPUT
          
          # 如果有失败，返回错误
          if [ $FAIL_COUNT -gt 0 ]; then
            echo "::error::${FAIL_COUNT} component(s) failed to push"
            exit 1
          fi

      - name: Create summary
        if: always()
        run: |
          COMPONENTS="${{ steps.params.outputs.components }}"
          TARGET_BRANCH="${{ steps.params.outputs.target_branch }}"
          FORCE_PUSH="${{ steps.params.outputs.force_push }}"
          
          echo "## Push to Subrepos Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Components**: ${COMPONENTS}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Branch**: ${TARGET_BRANCH}" >> $GITHUB_STEP_SUMMARY
          echo "- **Force Push**: ${FORCE_PUSH}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f /tmp/push_results.txt ]; then
            echo "### Results" >> $GITHUB_STEP_SUMMARY
            cat /tmp/push_results.txt >> $GITHUB_STEP_SUMMARY
          fi
